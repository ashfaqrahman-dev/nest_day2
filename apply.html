<!-- Application Form -->
<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow">

<div class="card-body">

<h3 class="text-center text-primary mb-4">Course Application Form</h3>

<form>

<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" placeholder="Enter your name" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" placeholder="Enter your email" required>
</div>

<div class="mb-3">
<label class="form-label">Phone Number</label>
<input type="tel" class="form-control" placeholder="Enter phone number" required>
</div>

<div class="mb-3">
<label class="form-label">Select Course</label>
<select class="form-select">
<option>MCA</option>
<option>Integrated MCA</option>
<option>MBA</option>
<option>MHRM</option>
<option>BCA</option>
<option>BSW</option>
<option>BSc Maths</option>
<option>MCA</option>
<option>IMCA</option>
<option>MBA</option>
<option>MHRM</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Message</label>
<textarea class="form-control" rows="3" placeholder="Any message"></textarea>
</div>

<div class="d-grid">
<button type="submit" class="btn btn-primary">Submit Application</button>
</div>

</form>

</div>
</div>

</div>

</div>

</div>
